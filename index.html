<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Waste Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      gap: 20px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #ccc;
      text-transform: uppercase;
    }

    /* ── Video feed ── */
    .video-wrapper {
      position: relative;
      width: 640px;
      max-width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #2a2a2a;
    }

    #feed {
      display: block;
      width: 100%;
    }

    /* ── Label badge ── */
    #label-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 24px;
      width: 640px;
      max-width: 100%;
    }

    #dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #label-text {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      flex: 1;
      transition: color 0.3s;
      color: #888;
    }

    #conf-text {
      font-size: 0.9rem;
      color: #555;
      transition: color 0.3s;
    }

    /* ── Confidence bar ── */
    .bar-wrapper {
      width: 640px;
      max-width: 100%;
    }

    .bar-label {
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .bar-bg {
      background: #1e1e1e;
      border-radius: 6px;
      height: 10px;
      width: 100%;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }

    #bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 6px;
      transition: width 0.2s ease, background 0.3s;
      background: #555;
    }

    /* ── Color themes per class ── */
    .theme-cardboard { --accent: #8B4513; }
    .theme-plastic   { --accent: #00D7FF; }
    .theme-metal     { --accent: #B4B4B4; }
    .theme-glass     { --accent: #FFC800; }
    .theme-none      { --accent: #555555; }

    body.theme-cardboard #dot,
    body.theme-cardboard #bar-fill { background: #8B4513; }
    body.theme-cardboard #label-text,
    body.theme-cardboard #conf-text { color: #c8763a; }

    body.theme-plastic #dot,
    body.theme-plastic #bar-fill { background: #00D7FF; }
    body.theme-plastic #label-text,
    body.theme-plastic #conf-text { color: #00D7FF; }

    body.theme-metal #dot,
    body.theme-metal #bar-fill { background: #B4B4B4; }
    body.theme-metal #label-text,
    body.theme-metal #conf-text { color: #d0d0d0; }

    body.theme-glass #dot,
    body.theme-glass #bar-fill { background: #FFC800; }
    body.theme-glass #label-text,
    body.theme-glass #conf-text { color: #FFC800; }

    /* ── Status dot (WebSocket connection) ── */
    .status {
      font-size: 0.75rem;
      color: #444;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #333;
    }
    .status-dot.connected { background: #3b8b4f; }
  </style>
</head>
<body class="theme-none">

  <h1>AI Waste Classifier</h1>

  <div class="video-wrapper">
    <img id="feed" src="/video_feed" alt="Live camera feed" />
  </div>

  <div id="label-box">
    <div id="dot"></div>
    <div id="label-text">Detecting...</div>
    <div id="conf-text">—</div>
  </div>

  <div class="bar-wrapper">
    <div class="bar-label">Confidence</div>
    <div class="bar-bg">
      <div id="bar-fill"></div>
    </div>
  </div>

  <div class="status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting...</span>
  </div>

  <script>
    const labelText  = document.getElementById('label-text');
    const confText   = document.getElementById('conf-text');
    const barFill    = document.getElementById('bar-fill');
    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    const THRESHOLD = 0.6;
    const THEMES = ['cardboard', 'plastic', 'metal', 'glass'];

    function setTheme(label) {
      THEMES.forEach(t => document.body.classList.remove('theme-' + t));
      document.body.classList.remove('theme-none');
      if (THEMES.includes(label)) {
        document.body.classList.add('theme-' + label);
      } else {
        document.body.classList.add('theme-none');
      }
    }

    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onopen = () => {
        statusDot.classList.add('connected');
        statusText.textContent = 'Connected';
      };

      ws.onmessage = ({ data }) => {
        const { label, confidence } = JSON.parse(data);
        const pct = Math.round(confidence * 100);

        if (confidence >= THRESHOLD) {
          labelText.textContent = label.toUpperCase();
          confText.textContent  = pct + '%';
          barFill.style.width   = pct + '%';
          setTheme(label);
        } else {
          labelText.textContent = 'Analyzing...';
          confText.textContent  = '—';
          barFill.style.width   = pct + '%';
          setTheme(null);
        }
      };

      ws.onclose = () => {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Reconnecting...';
        setTimeout(connect, 2000);   // auto-reconnect
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
